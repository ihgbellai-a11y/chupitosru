<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>滴 — Shizuku · Yes Ru</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="滴">
  <meta name="theme-color" content="#08080a">
  <meta name="robots" content="noindex, nofollow">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%23080808'/><text x='90' y='130' font-family='serif' font-size='110' font-weight='300' fill='%23d4af37' text-anchor='middle'>滴</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #08080a;
      --bg-2: #0d0d10;
      --bg-3: #14141a;
      --gold: #d4af37;
      --gold-soft: #e8c870;
      --gold-deep: #8b6914;
      --bone: #f5f5f0;
      --bone-soft: #b5b5a8;
      --crimson: #6b0a0a;
      --teal: #5eead4;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body, body * {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    input, textarea {
      -webkit-user-select: text !important;
      user-select: text !important;
    }

    html, body {
      background: var(--bg);
      color: var(--bone);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(212,175,55,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(94,234,212,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    .watermark {
      position: fixed;
      right: -20px; top: 50%;
      transform: translateY(-50%);
      font-family: 'Noto Serif JP', serif;
      font-size: 14rem; font-weight: 200;
      color: rgba(212,175,55,0.025);
      writing-mode: vertical-rl;
      letter-spacing: -10px;
      pointer-events: none;
      z-index: 0;
    }

    .back-btn {
      position: fixed;
      top: 18px; left: 18px;
      width: 38px; height: 38px;
      background: rgba(20,20,26,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 50%;
      color: var(--gold-deep);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      z-index: 100;
      font-family: 'Cormorant Garamond', serif;
    }
    .back-btn:active {
      background: rgba(212,175,55,0.15);
      color: var(--gold);
      border-color: var(--gold);
    }

    .container {
      position: relative; z-index: 10;
      max-width: 480px; margin: 0 auto;
      padding: 50px 22px 40px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeInDown 1s ease;
    }
    .kanji-main {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 3.2rem;
      color: var(--gold);
      letter-spacing: 14px;
      padding-left: 14px;
      margin-bottom: 14px;
      text-shadow: 0 0 40px rgba(212,175,55,0.35);
      line-height: 1;
    }
    .romaji {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--gold-deep);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--bone-soft);
      letter-spacing: 1px;
      margin-top: 10px;
    }
    .header-line {
      width: 1px; height: 40px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      margin: 24px auto;
    }

    /* COUNTER CARD */
    .counter-card {
      background: linear-gradient(145deg, var(--bg-3), var(--bg-2));
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 8px;
      padding: 36px 28px 30px;
      margin-bottom: 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 1s ease 0.2s both;
    }
    .counter-card::before, .counter-card::after {
      content: '';
      position: absolute;
      left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .counter-card::before { top: 0; }
    .counter-card::after { bottom: 0; opacity: 0.5; }

    .icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 16px rgba(94,234,212,0.4));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .count-label-top {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.6rem;
      color: var(--gold-deep);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .count {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5.5rem;
      font-weight: 400;
      line-height: 1;
      color: var(--gold);
      letter-spacing: -2px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      text-shadow: 0 0 30px rgba(212,175,55,0.3);
    }
    .count.pulse { animation: pulse 0.5s ease-out; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); color: var(--gold-soft); }
      100% { transform: scale(1); }
    }

    .count-label-bottom {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--bone-soft);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* PROGRESS CARD */
    .progress-card {
      background: linear-gradient(145deg, rgba(94,234,212,0.04), var(--bg-2));
      border: 1px solid rgba(94,234,212,0.15);
      border-radius: 8px;
      padding: 22px 22px;
      margin-bottom: 22px;
      animation: fadeInUp 1s ease 0.35s both;
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }
    .progress-label {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.6rem;
      color: var(--teal);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .progress-target {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--gold-deep);
      letter-spacing: 2px;
    }
    .countdown {
      text-align: center;
      margin-bottom: 16px;
    }
    .countdown-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--bone);
      line-height: 1;
      letter-spacing: 1px;
    }
    .countdown-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.78rem;
      color: var(--bone-soft);
      margin-top: 4px;
    }
    .countdown-target {
      color: var(--teal);
      font-style: normal;
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 100%);
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 10px rgba(94,234,212,0.4);
    }

    /* SYNC STATUS */
    .sync-status {
      text-align: center;
      font-size: 0.6rem;
      color: var(--gold-deep);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
      min-height: 14px;
      transition: color 0.3s;
      opacity: 0.7;
    }
    .sync-status.ok { color: var(--teal); }
    .sync-status.err { color: #ff8888; }

    /* MAIN BUTTON */
    .btn-main {
      width: 100%;
      padding: 24px;
      background: linear-gradient(145deg, var(--gold) 0%, #b8941f 100%);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 4px;
      cursor: pointer;
      box-shadow:
        0 12px 36px rgba(212,175,55,0.35),
        inset 0 1px 0 rgba(255,255,255,0.2);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-transform: uppercase;
      animation: fadeInUp 1s ease 0.5s both;
    }
    .btn-main:active {
      transform: scale(0.97);
      box-shadow: 0 6px 18px rgba(212,175,55,0.3);
    }
    .btn-main .emoji { font-size: 1.6rem; }

    /* SECONDARY BUTTONS */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      animation: fadeInUp 1s ease 0.6s both;
    }
    .btn-sec {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: var(--bone-soft);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-sec:active {
      background: rgba(255,255,255,0.08);
      color: var(--bone);
      border-color: rgba(212,175,55,0.3);
    }

    /* DROP ANIMATION */
    .drop {
      position: fixed;
      font-size: 2.4rem;
      pointer-events: none;
      z-index: 100;
      animation: dropFly 1s ease-out forwards;
    }
    @keyframes dropFly {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -200px) scale(2); }
    }

    /* CELEBRATION */
    .celebration {
      position: fixed; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      background: rgba(8,8,10,0.94);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeIn 0.4s ease;
      padding: 20px;
    }
    .celebration.show { display: flex; }
    .celebration-content {
      text-align: center;
      max-width: 380px;
    }
    .celebration .big-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 6rem;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 60px rgba(212,175,55,0.5);
      animation: celebrate 0.8s ease infinite alternate;
    }
    @keyframes celebrate {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }
    .celebration-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--gold);
      margin-top: 18px;
      letter-spacing: 2px;
    }
    .celebration-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 400;
      color: var(--teal);
      margin: 12px 0;
      line-height: 1;
      text-shadow: 0 0 30px rgba(94,234,212,0.4);
    }
    .celebration-msg {
      color: var(--bone-soft);
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }
    .btn-celebrate {
      padding: 14px 36px;
      background: var(--gold);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* FOOTER */
    footer {
      text-align: center;
      margin-top: auto;
      padding-top: 40px;
      animation: fadeIn 1.5s ease 0.8s both;
    }
    .ornament {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 24px;
    }
    .footer-text {
      font-size: 0.6rem;
      color: var(--gold-deep);
      letter-spacing: 4px;
      line-height: 2;
      text-transform: uppercase;
    }
    .footer-jp {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 4px;
      margin-top: 8px;
    }

    @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
    @keyframes fadeIn { from { opacity:0;} to {opacity:1;} }

    @media (max-width: 480px) {
      .kanji-main { font-size: 2.6rem; letter-spacing: 10px; }
      .count { font-size: 4.6rem; }
      .countdown-num { font-size: 2rem; }
      .watermark { font-size: 10rem; }
      .celebration .big-kanji { font-size: 5rem; }
      .celebration-num { font-size: 3rem; }
    }
  </style>
</head>
<body oncontextmenu="return false;">

<canvas class="particles" id="particles"></canvas>
<div class="watermark">滴</div>

<a href="https://ihgbellai-a11y.github.io/yesru1314/" class="back-btn" title="Volver al inicio">←</a>

<div class="container">

  <header>
    <h1 class="kanji-main">滴</h1>
    <p class="romaji">Shizuku · Yes Ru</p>
    <p class="subtitle">no me preguntes · simplemente dime que lo haga</p>
    <div class="header-line"></div>
  </header>

  <div class="counter-card">
    <div class="icon">💦</div>
    <div class="count-label-top">滴の数 · Total</div>
    <div class="count" id="count">252</div>
    <div class="count-label-bottom">chupitos honrados</div>
  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span class="progress-label">次の目標 · Próximo hito</span>
      <span class="progress-target" id="targetText">→ 300</span>
    </div>
    <div class="countdown">
      <div class="countdown-num" id="remaining">48</div>
      <div class="countdown-label">para llegar a <span class="countdown-target" id="targetNum">300</span></div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:52%"></div>
    </div>
  </div>

  <div class="sync-status" id="syncStatus">○ inicializando</div>

  <button class="btn-main" id="btnAdd">
    <span class="emoji">💦</span>
    <span>Yes Ru</span>
  </button>

  <div class="actions">
    <button class="btn-sec" id="btnUndo">← Deshacer</button>
    <button class="btn-sec" id="btnReset">Reiniciar</button>
  </div>

  <footer>
    <div class="ornament"></div>
    <div class="footer-text">Cada gota es una ofrenda</div>
    <div class="footer-jp">永遠にあなたのもの</div>
  </footer>

</div>

<div class="celebration" id="celebration">
  <div class="celebration-content">
    <div class="big-kanji">祝</div>
    <div class="celebration-title">¡Hito alcanzado!</div>
    <div class="celebration-num" id="celebNum">300</div>
    <div class="celebration-msg">Has llegado a otro centenar de gotas honradas</div>
    <button class="btn-celebrate" id="btnContinue">Continuar</button>
  </div>
</div>

<script>
  /* === PROTECCIONES === */
  document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && /^[IiJjCc]$/.test(e.key)) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && /^[UuSs]$/.test(e.key)) { e.preventDefault(); return false; }
  });
  document.addEventListener('dragstart', e => e.preventDefault());

  /* === ESTADO === */
  const STORAGE_KEY = 'chupitos_leche_count';
  const URL_KEY = 'yesru_sheet_url';
  const DEVICE_KEY = 'yesru_device_name';
  const QUEUE_KEY = 'yesru_pending_queue';
  const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxKSQtv3WbbimTcQQFX5y8UZWrgmcDxzOufrC3smj2bGcYJjUUI7u5uwUZPrMzc2xQp/exec';
  const START = 252;

  let count = parseInt(localStorage.getItem(STORAGE_KEY)) || START;
  let history = [];
  let sheetUrl = localStorage.getItem(URL_KEY) || DEFAULT_SHEET_URL;
  let deviceName = localStorage.getItem(DEVICE_KEY) || 'dispositivo';
  let pendingQueue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  let syncing = false;
  if (!localStorage.getItem(URL_KEY)) localStorage.setItem(URL_KEY, DEFAULT_SHEET_URL);

  /* === DOM === */
  const $count = document.getElementById('count');
  const $remaining = document.getElementById('remaining');
  const $targetNum = document.getElementById('targetNum');
  const $targetText = document.getElementById('targetText');
  const $progressFill = document.getElementById('progressFill');
  const $btnAdd = document.getElementById('btnAdd');
  const $btnUndo = document.getElementById('btnUndo');
  const $btnReset = document.getElementById('btnReset');
  const $celebration = document.getElementById('celebration');
  const $celebNum = document.getElementById('celebNum');
  const $btnContinue = document.getElementById('btnContinue');
  const $syncStatus = document.getElementById('syncStatus');

  /* === HELPERS === */
  function getNextTarget(n) { return Math.floor(n/100)*100 + 100; }
  function getPrevTarget(n) { return Math.floor(n/100)*100; }

  function setStatus(text, type) {
    $syncStatus.textContent = text;
    $syncStatus.className = 'sync-status ' + (type || '');
  }

  function render(animate=false) {
    const next = getNextTarget(count);
    const prev = getPrevTarget(count);
    const remaining = next - count;
    const progress = ((count - prev) / 100) * 100;

    $count.textContent = count;
    $remaining.textContent = remaining;
    $targetNum.textContent = next;
    $targetText.textContent = '→ ' + next;
    $progressFill.style.width = progress + '%';

    if (animate) {
      $count.classList.remove('pulse');
      void $count.offsetWidth;
      $count.classList.add('pulse');
    }
    localStorage.setItem(STORAGE_KEY, count);
  }

  function spawnDrop(x, y) {
    const drop = document.createElement('div');
    drop.className = 'drop';
    drop.textContent = '💦';
    drop.style.left = x + 'px';
    drop.style.top = y + 'px';
    document.body.appendChild(drop);
    setTimeout(() => drop.remove(), 1000);
  }

  /* === SONIDO GOTA === */
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playDropSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, t);
    osc.frequency.exponentialRampToValueAtTime(180, t + 0.12);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2200;
    filter.Q.value = 4;
    const delay = audioCtx.createDelay();
    delay.delayTime.value = 0.06;
    const delayGain = audioCtx.createGain();
    delayGain.gain.value = 0.25;
    osc.connect(gain);
    gain.connect(filter);
    filter.connect(audioCtx.destination);
    filter.connect(delay);
    delay.connect(delayGain);
    delayGain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.25);
  }
  function playCelebrationSound() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = t + i * 0.1;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.2, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    });
  }

  /* === ACCIONES === */
  function add() {
    initAudio();
    playDropSound();

    history.push(count);
    count++;

    const rect = $btnAdd.getBoundingClientRect();
    spawnDrop(rect.left + rect.width/2, rect.top + rect.height/2);

    render(true);

    if (count % 100 === 0) {
      setTimeout(() => {
        $celebNum.textContent = count;
        $celebration.classList.add('show');
        playCelebrationSound();
        if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      }, 400);
    } else if (navigator.vibrate) {
      navigator.vibrate(30);
    }

    if (sheetUrl) {
      queueAction({ accion: 'sumar', dispositivo: deviceName });
      flushQueue();
    }
  }

  function undo() {
    if (history.length === 0) return;
    count = history.pop();
    render(true);
    if (navigator.vibrate) navigator.vibrate(20);
    if (sheetUrl) {
      queueAction({ accion: 'deshacer', dispositivo: deviceName });
      flushQueue();
    }
  }

  function reset() {
    if (!confirm('¿Reiniciar el contador a ' + START + '?')) return;
    history.push(count);
    count = START;
    render(true);
    if (sheetUrl) {
      queueAction({ accion: 'set', valor: count, dispositivo: deviceName });
      flushQueue();
    }
  }

  $btnAdd.addEventListener('click', add);
  $btnUndo.addEventListener('click', undo);
  $btnReset.addEventListener('click', reset);
  $btnContinue.addEventListener('click', () => $celebration.classList.remove('show'));

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); add(); }
  });

  /* === SHEETS SYNC === */
  async function fetchRemoteTotal() {
    if (!sheetUrl) return null;
    try {
      const res = await fetch(sheetUrl, { method: 'GET' });
      const data = await res.json();
      return data.ok ? Number(data.total) : null;
    } catch (e) { return null; }
  }

  async function sendToSheet(payload) {
    if (!sheetUrl) return false;
    try {
      const res = await fetch(sheetUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        redirect: 'follow'
      });
      const data = await res.json();
      return data.ok === true;
    } catch (e) { return false; }
  }

  function queueAction(payload) {
    pendingQueue.push({ ...payload, ts: Date.now() });
    localStorage.setItem(QUEUE_KEY, JSON.stringify(pendingQueue));
  }

  async function flushQueue() {
    if (syncing || !sheetUrl || pendingQueue.length === 0) return;
    syncing = true;
    setStatus(`sincronizando ${pendingQueue.length}...`, '');
    while (pendingQueue.length > 0) {
      const item = pendingQueue[0];
      const ok = await sendToSheet(item);
      if (ok) {
        pendingQueue.shift();
        localStorage.setItem(QUEUE_KEY, JSON.stringify(pendingQueue));
      } else {
        setStatus(`pendientes: ${pendingQueue.length}`, 'err');
        syncing = false;
        return;
      }
    }
    syncing = false;
    setStatus('● sincronizado', 'ok');
  }

  async function initialSync() {
    if (!sheetUrl) {
      setStatus('○ sin conexión', '');
      return;
    }
    setStatus('comprobando...', '');
    const remoteTotal = await fetchRemoteTotal();
    if (remoteTotal !== null) {
      if (remoteTotal !== count && pendingQueue.length === 0) {
        count = remoteTotal;
        render(true);
      }
      setStatus('● sincronizado', 'ok');
      flushQueue();
    } else {
      setStatus('● error de conexión', 'err');
    }
  }

  window.addEventListener('online', flushQueue);

  /* === PARTÍCULAS === */
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
  function createParticles() {
    particles = [];
    const cnt = innerWidth < 600 ? 18 : 32;
    for (let i = 0; i < cnt; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.3,
        vy: Math.random() * 0.3 + 0.08,
        vx: (Math.random() - 0.5) * 0.1,
        opacity: Math.random() * 0.5 + 0.1
      });
    }
  }
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,175,55,${p.opacity})`;
      ctx.fill();
      p.y += p.vy; p.x += p.vx;
      if (p.y > canvas.height + 10) { p.y = -10; p.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(animate);
  }
  resizeCanvas(); createParticles(); animate();
  window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

  /* === INIT === */
  render();
  initialSync();
</script>
</body>
</html>
