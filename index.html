<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Yes Ru 💦</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  body, body *{
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  input, textarea{
    -webkit-user-select:text !important;
    user-select:text !important;
  }
  :root{
    --bg:#0a0e1a;
    --bg2:#111827;
    --gold:#d4af37;
    --gold-soft:#e8c870;
    --teal:#5eead4;
    --text:#f5f5f0;
    --muted:#9ca3af;
  }
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    min-height:100dvh;
    position:relative;
    overflow:hidden;
  }
  /* Fondo animado */
  .bg-canvas{position:fixed;inset:0;z-index:0;opacity:0.4}

  .back-home{
    position:fixed;
    top:18px; left:18px;
    width:38px; height:38px;
    background:rgba(20,20,26,0.7);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:50%;
    color:var(--gold-deep,#996515);
    font-size:16px;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
    font-family:'Cormorant Garamond',serif;
    transition:all 0.3s;
  }
  .back-home:active{
    background:rgba(212,175,55,0.15);
    color:var(--gold);
    border-color:var(--gold);
  }
  .bg-glow{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse at top,rgba(212,175,55,0.08) 0%,transparent 50%),
      radial-gradient(ellipse at bottom,rgba(94,234,212,0.05) 0%,transparent 50%);
    pointer-events:none;
  }

  .app{
    position:relative;z-index:1;
    height:100vh;height:100dvh;
    display:flex;flex-direction:column;
    padding:24px 20px;
    max-width:480px;margin:0 auto;
  }

  /* Header */
  .header{
    text-align:center;
    margin-bottom:8px;
    position:relative;
  }
  .header .brand{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:42px;
    line-height:1;
    background:linear-gradient(180deg,var(--gold-soft) 0%,var(--gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:-1px;
  }
  .header .brand::after{
    content:'';
    display:block;
    width:40px;height:1px;
    background:var(--gold);
    margin:8px auto 0;
    opacity:0.5;
  }
  .header h1{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:13px;
    font-weight:400;
    letter-spacing:1px;
    color:var(--muted);
    margin-top:10px;
    text-transform:lowercase;
  }
  .config-btn{
    position:absolute;
    top:24px;right:20px;
    width:36px;height:36px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:50%;
    color:var(--muted);
    font-size:16px;
    cursor:pointer;
    transition:all 0.2s;
    z-index:10;
  }
  .config-btn:active{
    background:rgba(212,175,55,0.15);
    color:var(--gold);
  }
  .sync-status{
    margin-top:8px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    height:14px;
    transition:color 0.3s;
  }
  .sync-status.ok{color:var(--teal)}
  .sync-status.err{color:#f87171}
  .sync-status.pending{color:var(--gold)}

  /* Modal config */
  .modal{
    position:fixed;inset:0;
    display:none;
    align-items:center;justify-content:center;
    z-index:300;
    background:rgba(10,14,26,0.92);
    backdrop-filter:blur(20px);
    padding:20px;
  }
  .modal.show{display:flex}
  .modal-card{
    background:linear-gradient(145deg,#141a2a,#0f1420);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:24px;
    padding:28px 24px;
    max-width:420px;width:100%;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
  }
  .modal-title{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;
    color:var(--gold);
    margin-bottom:8px;
  }
  .modal-desc{
    font-size:13px;
    color:var(--muted);
    margin-bottom:20px;
    line-height:1.5;
  }
  .modal label{
    display:block;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:6px;
    margin-top:14px;
  }
  .modal input{
    width:100%;
    padding:12px 14px;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    color:var(--text);
    font-family:'Poppins',sans-serif;
    font-size:13px;
    user-select:text;-webkit-user-select:text;
  }
  .modal input:focus{
    outline:none;
    border-color:var(--gold);
  }
  .modal-actions{
    display:flex;gap:10px;
    margin-top:22px;
  }
  .modal-actions button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  .btn-save{
    background:var(--gold);
    color:#0a0e1a;
  }
  .btn-cancel{
    background:rgba(255,255,255,0.05);
    color:var(--muted);
  }
  .btn-disconnect{
    background:transparent;
    color:#f87171;
    border:1px solid rgba(248,113,113,0.3) !important;
    margin-top:10px;
    width:100%;
    padding:10px;
    border-radius:12px;
    font-size:12px;
    cursor:pointer;
  }

  /* Contador principal */
  .counter-wrap{
    flex:1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:16px;
    padding:20px 0;
  }
  .counter-card{
    background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(212,175,55,0.2);
    border-radius:32px;
    padding:32px 24px;
    width:100%;
    text-align:center;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.08);
    position:relative;
    overflow:hidden;
  }
  .counter-card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .icon{
    font-size:56px;
    line-height:1;
    margin-bottom:8px;
    filter:drop-shadow(0 4px 12px rgba(94,234,212,0.4));
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
  }
  .count{
    font-size:96px;
    font-weight:800;
    line-height:1;
    background:linear-gradient(180deg,var(--gold-soft) 0%,var(--gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:-3px;
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .count.pulse{animation:pulse 0.5s ease-out}
  @keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.15)}
    100%{transform:scale(1)}
  }
  .count-label{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:18px;
    color:var(--text);
    margin-top:4px;
    opacity:0.7;
  }

  /* Cuenta regresiva al siguiente 100 */
  .progress-card{
    background:linear-gradient(145deg,rgba(94,234,212,0.06),rgba(94,234,212,0.02));
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(94,234,212,0.15);
    border-radius:24px;
    padding:20px;
    width:100%;
  }
  .progress-top{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:12px;
  }
  .progress-top .left{
    font-size:11px;font-weight:600;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--teal);
  }
  .progress-top .right{
    font-size:13px;color:var(--muted);
  }
  .countdown{
    text-align:center;
    margin-bottom:14px;
  }
  .countdown-num{
    font-size:42px;
    font-weight:700;
    color:var(--text);
    line-height:1;
    letter-spacing:-1px;
  }
  .countdown-label{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:14px;
    color:var(--muted);
    margin-top:2px;
  }
  .countdown-target{
    color:var(--teal);
    font-weight:600;
    font-style:normal;
    font-family:'Poppins',sans-serif;
  }
  .progress-bar{
    height:8px;
    background:rgba(255,255,255,0.05);
    border-radius:100px;
    overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--teal) 0%,var(--gold) 100%);
    border-radius:100px;
    transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 0 12px rgba(94,234,212,0.5);
  }

  /* Botón principal */
  .btn-main{
    width:100%;
    padding:24px;
    background:linear-gradient(145deg,var(--gold) 0%,#b8941f 100%);
    border:none;
    border-radius:28px;
    color:#0a0e1a;
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:1px;
    cursor:pointer;
    box-shadow:
      0 10px 30px rgba(212,175,55,0.4),
      inset 0 1px 0 rgba(255,255,255,0.3);
    transition:all 0.15s ease;
    display:flex;align-items:center;justify-content:center;gap:12px;
    margin-top:16px;
  }
  .btn-main:active{
    transform:scale(0.96);
    box-shadow:0 5px 15px rgba(212,175,55,0.3);
  }
  .btn-main .emoji{font-size:32px}

  /* Acciones secundarias */
  .actions{
    display:flex;gap:10px;
    margin-top:12px;
  }
  .btn-sec{
    flex:1;
    padding:12px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    color:var(--muted);
    font-family:'Poppins',sans-serif;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s;
  }
  .btn-sec:active{
    background:rgba(255,255,255,0.08);
    color:var(--text);
  }

  /* Animación gota */
  .drop{
    position:fixed;
    font-size:40px;
    pointer-events:none;
    z-index:100;
    animation:dropFly 1s ease-out forwards;
  }
  @keyframes dropFly{
    0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-200px) scale(2)}
  }

  /* Celebración objetivo */
  .celebration{
    position:fixed;inset:0;
    display:none;
    align-items:center;justify-content:center;
    z-index:200;
    background:rgba(10,14,26,0.9);
    backdrop-filter:blur(20px);
    animation:fadeIn 0.4s ease;
  }
  .celebration.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .celebration-content{
    text-align:center;
    padding:40px;
  }
  .celebration .big-emoji{
    font-size:120px;
    animation:bounce 0.8s ease infinite alternate;
  }
  @keyframes bounce{
    from{transform:scale(1) rotate(-5deg)}
    to{transform:scale(1.1) rotate(5deg)}
  }
  .celebration h2{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:36px;
    color:var(--gold);
    margin:16px 0 8px;
  }
  .celebration p{
    color:var(--text);
    font-size:18px;
    margin-bottom:24px;
  }
  .celebration .num{
    font-size:64px;
    font-weight:800;
    color:var(--teal);
    margin:8px 0;
  }
  .btn-celebrate{
    padding:16px 32px;
    background:var(--gold);
    border:none;
    border-radius:16px;
    color:#0a0e1a;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    letter-spacing:1px;
  }
</style>
</head>
<body oncontextmenu="return false;">
<div class="bg-glow"></div>
<canvas class="bg-canvas" id="bgCanvas"></canvas>

<a href="https://bellaproject.github.io/yesru1314/" class="back-home" title="Volver al inicio">←</a>

<div class="app">
  <div class="header">
    <button class="config-btn" id="btnConfig" title="Conectar Sheets">⚙</button>
    <div class="brand">Yes Ru</div>
    <h1>no me preguntes · simplemente dime que lo haga</h1>
    <div class="sync-status" id="syncStatus"></div>
  </div>

  <div class="counter-wrap">
    <div class="counter-card">
      <div class="icon">💦</div>
      <div class="count" id="count">252</div>
      <div class="count-label">chupitos totales</div>
    </div>

    <div class="progress-card">
      <div class="progress-top">
        <span class="left">Próximo objetivo</span>
        <span class="right" id="targetText">→ 300</span>
      </div>
      <div class="countdown">
        <div class="countdown-num" id="remaining">48</div>
        <div class="countdown-label">para llegar a <span class="countdown-target" id="targetNum">300</span></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:52%"></div>
      </div>
    </div>
  </div>

  <button class="btn-main" id="btnAdd">
    <span class="emoji">💦</span>
    <span>YES RU</span>
  </button>

  <div class="actions">
    <button class="btn-sec" id="btnUndo">← Deshacer</button>
    <button class="btn-sec" id="btnReset">Reiniciar</button>
  </div>
</div>

<div class="modal" id="configModal">
  <div class="modal-card">
    <div class="modal-title">Conectar con Google Sheets</div>
    <div class="modal-desc">Pega aquí la URL del Web App que has desplegado en Apps Script. Acaba en <strong>/exec</strong>.</div>
    <label>URL del Web App</label>
    <input type="url" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
    <label>Nombre de este dispositivo</label>
    <input type="text" id="deviceName" placeholder="Ej: iPhone Rubén" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelConfig">Cancelar</button>
      <button class="btn-save" id="btnSaveConfig">Guardar y sincronizar</button>
    </div>
    <button class="btn-disconnect" id="btnDisconnect">Desconectar</button>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-content">
    <div class="big-emoji">🎉</div>
    <h2>¡Objetivo cumplido!</h2>
    <div class="num" id="celebNum">300</div>
    <p>Has llegado a otro hito de 100 💦</p>
    <button class="btn-celebrate" id="btnContinue">Continuar</button>
  </div>
</div>

<script>
  /* === PROTECCIONES === */
  document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && /^[IiJjCc]$/.test(e.key)) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && /^[UuSs]$/.test(e.key)) { e.preventDefault(); return false; }
  });
  document.addEventListener('dragstart', e => e.preventDefault());

  const STORAGE_KEY = 'chupitos_leche_count';
  const URL_KEY = 'yesru_sheet_url';
  const DEVICE_KEY = 'yesru_device_name';
  const QUEUE_KEY = 'yesru_pending_queue';
  const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxKSQtv3WbbimTcQQFX5y8UZWrgmcDxzOufrC3smj2bGcYJjUUI7u5uwUZPrMzc2xQp/exec';
  const START = 252;

  let count = parseInt(localStorage.getItem(STORAGE_KEY)) || START;
  let history = [];
  let sheetUrl = localStorage.getItem(URL_KEY) || DEFAULT_SHEET_URL;
  let deviceName = localStorage.getItem(DEVICE_KEY) || 'dispositivo';
  let pendingQueue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  let syncing = false;
  if (!localStorage.getItem(URL_KEY)) localStorage.setItem(URL_KEY, DEFAULT_SHEET_URL);

  // Sonido de placer sintetizado (Web Audio API)
  let audioCtx = null;
  function initAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playPleasureSound(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;

    // Gota de agua: frecuencia cae rápido (efecto "plop")
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, t);
    osc.frequency.exponentialRampToValueAtTime(180, t + 0.12);

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

    // Filtro pasa-bajos para suavizar
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2200;
    filter.Q.value = 4;

    // Pequeña resonancia/eco para sensación líquida
    const delay = audioCtx.createDelay();
    delay.delayTime.value = 0.06;
    const delayGain = audioCtx.createGain();
    delayGain.gain.value = 0.25;

    osc.connect(gain);
    gain.connect(filter);
    filter.connect(audioCtx.destination);
    filter.connect(delay);
    delay.connect(delayGain);
    delayGain.connect(audioCtx.destination);

    osc.start(t);
    osc.stop(t + 0.25);
  }

  function playCelebrationSound(){
    if(!audioCtx) return;
    const t = audioCtx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50]; // Do, Mi, Sol, Do
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = t + i * 0.1;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.2, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.4);
    });
  }

  const $count = document.getElementById('count');
  const $remaining = document.getElementById('remaining');
  const $targetNum = document.getElementById('targetNum');
  const $targetText = document.getElementById('targetText');
  const $progressFill = document.getElementById('progressFill');
  const $btnAdd = document.getElementById('btnAdd');
  const $btnUndo = document.getElementById('btnUndo');
  const $btnReset = document.getElementById('btnReset');
  const $celebration = document.getElementById('celebration');
  const $celebNum = document.getElementById('celebNum');
  const $btnContinue = document.getElementById('btnContinue');

  function getNextTarget(n){
    return Math.floor(n/100)*100 + 100;
  }

  function getPrevTarget(n){
    return Math.floor(n/100)*100;
  }

  function render(animate=false){
    const next = getNextTarget(count);
    const prev = getPrevTarget(count);
    const remaining = next - count;
    const progress = ((count - prev) / 100) * 100;

    $count.textContent = count;
    $remaining.textContent = remaining;
    $targetNum.textContent = next;
    $targetText.textContent = '→ ' + next;
    $progressFill.style.width = progress + '%';

    if(animate){
      $count.classList.remove('pulse');
      void $count.offsetWidth;
      $count.classList.add('pulse');
    }

    localStorage.setItem(STORAGE_KEY, count);
  }

  function spawnDrop(x, y){
    const drop = document.createElement('div');
    drop.className = 'drop';
    drop.textContent = '💦';
    drop.style.left = x + 'px';
    drop.style.top = y + 'px';
    document.body.appendChild(drop);
    setTimeout(() => drop.remove(), 1000);
  }

  function add(e){
    initAudio();
    playPleasureSound();

    const wasMultiple100 = count > 0 && count % 100 === 0 && count !== START;
    history.push(count);
    count++;

    // Animación gota
    const rect = $btnAdd.getBoundingClientRect();
    const x = rect.left + rect.width/2;
    const y = rect.top + rect.height/2;
    spawnDrop(x, y);

    render(true);

    // Celebración al llegar a múltiplo de 100
    if(count % 100 === 0){
      setTimeout(() => {
        $celebNum.textContent = count;
        $celebration.classList.add('show');
        playCelebrationSound();
        if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
      }, 400);
    } else {
      if(navigator.vibrate) navigator.vibrate(30);
    }
  }

  function undo(){
    if(history.length === 0) return;
    count = history.pop();
    render(true);
    if(navigator.vibrate) navigator.vibrate(20);
  }

  function reset(){
    if(!confirm('¿Reiniciar el contador a 252?')) return;
    history.push(count);
    count = START;
    render(true);
  }

  $btnAdd.addEventListener('click', add);
  $btnUndo.addEventListener('click', undo);
  $btnReset.addEventListener('click', reset);
  $btnContinue.addEventListener('click', () => {
    $celebration.classList.remove('show');
  });

  // ===== SINCRONIZACIÓN CON SHEETS =====
  const $syncStatus = document.getElementById('syncStatus');
  const $btnConfig = document.getElementById('btnConfig');
  const $configModal = document.getElementById('configModal');
  const $sheetUrl = document.getElementById('sheetUrl');
  const $deviceName = document.getElementById('deviceName');
  const $btnSaveConfig = document.getElementById('btnSaveConfig');
  const $btnCancelConfig = document.getElementById('btnCancelConfig');
  const $btnDisconnect = document.getElementById('btnDisconnect');

  function setStatus(text, type){
    $syncStatus.textContent = text;
    $syncStatus.className = 'sync-status ' + (type || '');
  }

  function updateConnectionUI(){
    if(sheetUrl){
      setStatus('● sincronizado · ' + deviceName, 'ok');
    } else {
      setStatus('○ sin conectar', '');
    }
  }

  $btnConfig.addEventListener('click', () => {
    $sheetUrl.value = sheetUrl;
    $deviceName.value = deviceName !== 'dispositivo' ? deviceName : '';
    $configModal.classList.add('show');
  });

  $btnCancelConfig.addEventListener('click', () => {
    $configModal.classList.remove('show');
  });

  $btnDisconnect.addEventListener('click', () => {
    if(!confirm('¿Desconectar de Sheets? Los datos locales se conservan.')) return;
    sheetUrl = '';
    localStorage.removeItem(URL_KEY);
    updateConnectionUI();
    $configModal.classList.remove('show');
  });

  $btnSaveConfig.addEventListener('click', async () => {
    const url = $sheetUrl.value.trim();
    const name = $deviceName.value.trim() || 'dispositivo';
    if(!url || !url.includes('script.google.com')){
      alert('Pega una URL válida de Apps Script (debe contener script.google.com y acabar en /exec)');
      return;
    }
    sheetUrl = url;
    deviceName = name;
    localStorage.setItem(URL_KEY, url);
    localStorage.setItem(DEVICE_KEY, name);
    setStatus('conectando...', 'pending');
    $configModal.classList.remove('show');

    // Al conectar, sincronizar: traer el total del Sheet (es la fuente de verdad)
    const remoteTotal = await fetchRemoteTotal();
    if(remoteTotal !== null){
      if(remoteTotal !== count){
        if(confirm(`Sheets tiene ${remoteTotal}. Tu dispositivo tiene ${count}.\n\n¿Quieres usar el valor de Sheets (${remoteTotal})?\n\nAceptar = usar Sheets · Cancelar = subir tu valor local`)){
          count = remoteTotal;
          render(true);
        } else {
          // Subir valor local como "set"
          await sendToSheet({ accion: 'set', valor: count, dispositivo: deviceName });
        }
      }
      updateConnectionUI();
      flushQueue();
    } else {
      setStatus('error de conexión · revisa URL', 'err');
    }
  });

  async function fetchRemoteTotal(){
    if(!sheetUrl) return null;
    try {
      const res = await fetch(sheetUrl, { method: 'GET' });
      const data = await res.json();
      if(data.ok) return Number(data.total);
      return null;
    } catch(err){
      console.error('fetchRemoteTotal', err);
      return null;
    }
  }

  async function sendToSheet(payload){
    if(!sheetUrl) return false;
    try {
      // text/plain evita preflight CORS con Apps Script
      const res = await fetch(sheetUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload),
        redirect: 'follow'
      });
      const data = await res.json();
      return data.ok === true;
    } catch(err){
      console.error('sendToSheet', err);
      return false;
    }
  }

  function queueAction(payload){
    pendingQueue.push({ ...payload, ts: Date.now() });
    localStorage.setItem(QUEUE_KEY, JSON.stringify(pendingQueue));
  }

  async function flushQueue(){
    if(syncing || !sheetUrl || pendingQueue.length === 0) return;
    syncing = true;
    setStatus(`sincronizando ${pendingQueue.length}...`, 'pending');

    while(pendingQueue.length > 0){
      const item = pendingQueue[0];
      const ok = await sendToSheet(item);
      if(ok){
        pendingQueue.shift();
        localStorage.setItem(QUEUE_KEY, JSON.stringify(pendingQueue));
      } else {
        setStatus(`pendientes: ${pendingQueue.length}`, 'err');
        syncing = false;
        return;
      }
    }
    syncing = false;
    updateConnectionUI();
  }

  // Hook al add/undo: registrar en cola
  const originalAdd = add;
  // Ya conectados arriba, sobrescribimos el listener añadiendo sync
  $btnAdd.removeEventListener('click', add);
  $btnAdd.addEventListener('click', (e) => {
    add(e);
    if(sheetUrl){
      queueAction({ accion: 'sumar', dispositivo: deviceName });
      flushQueue();
    }
  });

  $btnUndo.removeEventListener('click', undo);
  $btnUndo.addEventListener('click', () => {
    if(history.length === 0) return;
    undo();
    if(sheetUrl){
      queueAction({ accion: 'deshacer', dispositivo: deviceName });
      flushQueue();
    }
  });

  // Reintentar cola al volver online
  window.addEventListener('online', flushQueue);

  // Sincronización pasiva al abrir la app (traer total remoto)
  async function checkRemote(){
    if(!sheetUrl) return;
    setStatus('comprobando...', 'pending');
    const remoteTotal = await fetchRemoteTotal();
    if(remoteTotal !== null && remoteTotal !== count && pendingQueue.length === 0){
      // Sheet es fuente de verdad si no hay cola pendiente
      count = remoteTotal;
      render(true);
    }
    updateConnectionUI();
    flushQueue();
  }

  updateConnectionUI();
  if(sheetUrl) checkRemote();

  // Atajo: barra espaciadora suma
  document.addEventListener('keydown', (e) => {
    if(e.code === 'Space'){ e.preventDefault(); add(); }
    if(e.code === 'KeyZ' && (e.metaKey || e.ctrlKey)){ e.preventDefault(); undo(); }
  });

  render();

  // Fondo de partículas suaves
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for(let i=0;i<25;i++){
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.5+0.3,
      vy: Math.random()*0.3+0.1,
      opacity: Math.random()*0.4+0.1
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(212,175,55,${p.opacity})`;
      ctx.fill();
      p.y += p.vy;
      if(p.y > canvas.height){
        p.y = -10;
        p.x = Math.random()*canvas.width;
      }
    });
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
